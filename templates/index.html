<!DOCTYPE html>
<html>
<head>
<title>JEE Mock Test</title>

<style>
body { margin:0; font-family:Arial; background:#f3f4f6; }

/* NTA HEADER */
.nta-header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#e5e7eb;
    padding:10px 20px;
}

/* LEFT */
.nta-left {
    display:flex;
    align-items:center;
    gap:15px;
}


/* ORANGE HEADER */
.header {
    background:#f97316;
    color:white;
    font-size:22px;
    font-weight:bold;
    padding:10px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}


/* SECOND BAR */
.candidate-bar {
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#f1f5f9;
    padding:10px 20px;
    border-bottom:1px solid #ccc;
}

/* LEFT IMAGE */
.profile {
    width:75px;
    height:75px;
    border-radius:5px;
}

/* CENTER INFO */
.candidate-info {
    flex:1;
    margin-left:20px;
    font-size:20px;
    line-height:1.5;
}

/* RIGHT DROPDOWN */
.candidate-right {
    text-align:right;
    font-size:20px;
}

/* TIMER */
.timer-pill {
    background:#0284c7;
    color:white;
    padding:3px 10px;
    border-radius:15px;
    font-weight:bold;
}
    border-radius:15px;
    font-weight:bold;
}

#timer {
    font-size:22px;
    font-weight:bold;
    color:white;
}

.timer-warning {
    background-color:red;
    border-color:red;
}

/* LAYOUT */
.container { display:flex; }
.left { width:70%; padding:20px; background:white; }
.right { width:30%; background:#eef2f7; padding:15px; }

/* OPTIONS */
.options button {
    display:block;
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    font-size:20px;
    background:white;
    text-align:left;
    cursor:pointer;
}

.selected {
    background:#2563eb !important;
    color:white;
}

/* BUTTONS */
.controls button {
    padding:10px 15px;
    margin:5px;
    border:none;
    cursor:pointer;
    font-size:22px;
    font-weight:bold;
    border-radius:4px;
}

.save { background:#22c55e; color:white; }
.review-btn { background:#a855f7; color:white; }
.clear { background:#ef4444; color:white; }
.nav { background:#e5e7eb; }
.submit { background:#2563eb; color:white; }

/* PALETTE */
.palette {
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:1px 2px;
}

.qbtn {
    width:50px;
    height:50px;
    border-radius:8px;
    border:1px solid black;
    font-weight:bold;
    font-size:22px;
}

.summary-box {
    background:white;
    padding:10px;
    border:1px dashed black;
    margin-bottom:10px;
    font-size:22px;
}

/* COLORS */
.not-visited { background:#e5e7eb; }
.not-answered { background:#ef4444; color:white; }
.answered { background:#22c55e; color:white; }
.review { background:#a855f7; color:white; }

/* INSTRUCTIONS */
#instructions { padding:30px; }
</style>
</head>

<body>

<!-- INSTRUCTIONS -->
<div id="instructions">
    <h2>Instructions</h2>
    <p>Each correct answer: +4, wrong: -1</p>

    <input type="checkbox" id="agree"> I agree<br><br>

    <form method="post" enctype="multipart/form-data">
        <input type="file" name="pdf" required>
        <button type="submit" onclick="return checkAgree()">Start Test</button>
    </form>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<!-- NTA HEADER -->
<div class="nta-header">

    <!-- LEFT: LOGOS -->
    <div class="nta-left">
        <img src="https://www.nta.ac.in/img/Logo.png" height="80">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" height="80">
        <div>
            <b>National Testing Agency</b><br>
            <small>Ministry of Education, Govt. of India</small>
        </div>
    </div>
</div>

<div class="candidate-bar">

    <div class="candidate-left">
        <img src="my-image.jpg" class="profile">
    </div>

    <div class="candidate-info">
        <div><b>Candidate Name:</b> Anshu</div>
        <div><b>Exam Name:</b> JEE-Main</div>
        <div><b>Subject Name:</b> Mock Test</div>
        <div><b>Remaining Time:</b> 
            <span id="timer" class="timer-pill">02:59:00</span>
        </div>
    </div>

    <div class="candidate-right">
        <select>
            <option>English</option>
            <option>Hindi</option>
        </select>
    </div>
</div>

<!-- ORANGE BAR -->
<div class="header">
    <div>Mock Test</div>
</div>

<div class="container">
<div class="left">
    <h3 id="qnum"></h3>
    <div id="viewer"></div>

    <div class="options">
        <button id="optA" onclick="selectOption('A')">A</button>
        <button id="optB" onclick="selectOption('B')">B</button>
        <button id="optC" onclick="selectOption('C')">C</button>
        <button id="optD" onclick="selectOption('D')">D</button>
    </div>

    <div class="controls">
        <button class="save" onclick="saveNext()">Save & Next</button>
        <button class="review-btn" onclick="markReview()">Mark Review</button>
        <button class="clear" onclick="clearResponse()">Clear</button>
        <button class="nav" onclick="prevQ()">Prev</button>
        <button class="nav" onclick="nextQ()">Next</button>
        <button class="submit" onclick="confirmSubmit()">Submit</button>
    </div>
</div>

<div class="right">

    <!-- LIVE SUMMARY -->
    <div class="summary-box">
        <h4>Summary</h4>
        <div>Answered: <span id="ansCount">0</span></div>
        <div>Not Answered: <span id="notAnsCount">0</span></div>
        <div>Marked for Review: <span id="reviewCount">0</span></div>
        <div>Not Visited: <span id="notVisitedCount">0</span></div>
    </div>

    <br>

    <div class="palette" id="palette"></div>

</div>

<script>
let filename = "{{ filename or '' }}";
let current = 0;
let total = {{ total_pages or 0 }};
let answers = {};
let status = {};

let totalTime = 180*60;
let warned=false;

// AGREEMENT
function checkAgree(){
    if(!document.getElementById("agree").checked){
        alert("Agree first!");
        return false;
    }
    return true;
}

// SHOW MAIN
if(total > 0){
    document.getElementById("instructions").style.display="none";
    document.getElementById("main").style.display="block";
}

// TIMER
setInterval(()=>{
    let m=Math.floor(totalTime/60);
    let s=totalTime%60;

    document.getElementById("timer").innerText =
        m+":"+s.toString().padStart(2,'0');

    if(totalTime==300 && !warned){
        alert("⚠️ 5 minutes remaining!");
        warned=true;
    }

    if(totalTime==0){
        alert("Time up!");
        submitTest();
    }

    if(totalTime>0) totalTime--;
},1000);

// PALETTE
function initPalette(){
    let p=document.getElementById("palette");
    for(let i=0;i<total;i++){
        let b=document.createElement("button");
        b.innerText=i+1;
        b.className="qbtn not-visited";
        b.onclick=()=>goTo(i);
        p.appendChild(b);
    }
}

function updatePalette(){
    let b=document.getElementsByClassName("qbtn");
    for(let i=0;i<b.length;i++){
        if(status[i]=="answered") b[i].className="qbtn answered";
        else if(status[i]=="review") b[i].className="qbtn review";
        else if(status[i]=="visited") b[i].className="qbtn not-answered";
    }
}

// LOAD PAGE (MAIN FIX)
function loadPage(page){
    fetch(`/get_page/${filename}/${page}`)
    .then(res => res.text())
    .then(data => {
        document.getElementById("qnum").innerText="Q "+(page+1);

        document.getElementById("viewer").innerHTML =
            `<img src="data:image/png;base64,${data}" style="width:100%">`;

        status[page]=status[page]||"visited";

        ["A","B","C","D"].forEach(o=>{
            document.getElementById("opt"+o).classList.remove("selected");
        });

        if(answers[page])
            document.getElementById("opt"+answers[page]).classList.add("selected");

        updatePalette();
        updateSummary();
    });
}

// OPTIONS
function selectOption(opt){
    answers[current]=opt;
    status[current]="answered";

    ["A","B","C","D"].forEach(o=>{
        document.getElementById("opt"+o).classList.remove("selected");
    });

    document.getElementById("opt"+opt).classList.add("selected");

    updatePalette();
    updateSummary();
}

// CONTROLS
function saveNext(){ nextQ(); }
function markReview(){ status[current]="review"; nextQ(); updateSummary(); }
function clearResponse(){ delete answers[current]; status[current]="visited"; updatePalette(); updateSummary();}

function nextQ(){
    if(current < total - 1){
        current++;
        loadPage(current);
    }
}

function prevQ(){
    if(current > 0){
        current--;
        loadPage(current);
    }
}

function goTo(i){
    current=i;
    loadPage(i);
}

// SUBMIT
function confirmSubmit(){
    let answered=0, review=0, notAnswered=0;

    for(let i=0;i<total;i++){
        if(status[i]=="answered") answered++;
        else if(status[i]=="review") review++;
        else if(status[i]=="visited") notAnswered++;
    }

    if(confirm(
        `Submit Test?\n\n` +
        `Answered: ${answered}\n` +
        `Not Answered: ${notAnswered}\n` +
        `Marked: ${review}\n` +
        `Total: ${total}`
    )){
        submitTest();
    }
}

function submitTest(){
    let html="<h2>Response Sheet</h2>";
    for(let i=0;i<total;i++){
        let ans=answers[i]||"Not Answered";
        html+=`<p>Q${i+1}: ${ans}</p>`;
    }
    document.body.innerHTML=html;
}

// SUMMARY
function updateSummary(){
    let answered=0, notAnswered=0, review=0, notVisited=0;

    for(let i=0;i<total;i++){
        if(status[i]=="answered") answered++;
        else if(status[i]=="review") review++;
        else if(status[i]=="visited") notAnswered++;
        else notVisited++;
    }

    document.getElementById("ansCount").innerText = answered;
    document.getElementById("notAnsCount").innerText = notAnswered;
    document.getElementById("reviewCount").innerText = review;
    document.getElementById("notVisitedCount").innerText = notVisited;
}

// START
if(total > 0){
    document.getElementById("instructions").style.display="none";
    document.getElementById("main").style.display="block";

    initPalette();
    loadPage(0);
}
</script>

</body>
</html>
